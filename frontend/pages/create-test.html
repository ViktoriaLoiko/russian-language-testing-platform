<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание теста</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/create-test.css">
</head>
<body>

<header>
    <div class="header-left">
        <img src="../img/logo.png" alt="Логотип платформы" class="logo">
    </div>

    <div class="header-center">
        <h1>Тестирование русского языка</h1>
        <div class="header-line"></div>
    </div>

    <div class="header-right">
        <a href="teacher-dashboard.html">
            <button class="auth-button">Кабинет</button>
        </a>
    </div>
</header>

<main class="create-test-main">

    <section class="create-test-container">

        <h2>Создание теста</h2>

        <form id="createTestForm">

            <label>Название теста</label>
            <input type="text" id="testTitle" placeholder="Безударные гласные">

            <label>Задание</label>
            <textarea id="instruction" placeholder="Вставьте пропущенные буквы."></textarea>

            <label>Текст для ученика</label>
            <textarea id="taskText" placeholder="М_л_ко стоит на ст_ле."></textarea>

            <label>Правильный ответ</label>
            <textarea id="correctAnswer" placeholder="Молоко стоит на столе."></textarea>

            <div class="grading-box">

                <h3>Оценивание</h3>

                <div class="grading-row">
                    <label>Оценка 5 от</label>
                    <input type="number" id="grade5" placeholder="90">
                    <span>%</span>
                </div>

                <div class="grading-row">
                    <label>Оценка 4 от</label>
                    <input type="number" id="grade4" placeholder="75">
                    <span>%</span>
                </div>

                <div class="grading-row">
                    <label>Оценка 3 от</label>
                    <input type="number" id="grade3" placeholder="50">
                    <span>%</span>
                </div>

            </div>

            <div class="qr-box">

                <div>
                    <h3>Доступ к тесту</h3>
                    <p id="qrText">QR-код будет создан после сохранения теста.</p>
                    <p id="testCodeText"></p>
                </div>

                <div class="qr-placeholder" id="qrPlaceholder">
                    QR
                </div>

            </div>

            <p id="createTestMessage"></p>

            <div class="form-actions">
                <a href="teacher-dashboard.html" class="secondary-button">
                    Назад
                </a>

                <button type="submit" class="main-button">
                    Сохранить тест
                </button>
            </div>

        </form>


    </section>

</main>

<footer>
    <p>© 2026 Тестирование знаний русского языка</p>
</footer>

<script src="../js/create-test.js"></script>
</body>
</html>
