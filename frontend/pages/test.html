<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прохождение теста</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/test.css">
</head>
<body>

<header>
    <div class="header-left">
        <img src="../img/logo.png" alt="Логотип платформы" class="logo">
    </div>

    <div class="header-center">
        <h1>Тестирование русского языка</h1>
        <div class="header-line"></div>
    </div>

    <div class="header-right">
        <a href="../index.html">
            <button class="auth-button">Главная</button>
        </a>
    </div>
</header>

<main class="test-main">

    <section class="test-container">

        <!-- test data from database later -->

        <h2 id="testTitle">Загрузка теста...</h2>

        <div class="student-info-box">

            <!-- student data from database later -->
            <!-- guest users enter data manually -->

            <h3>Ученик</h3>

            <div id="registeredStudentBox">
                <p><strong>Имя:</strong> <span id="studentName">Гость</span></p>
                <p><strong>Класс:</strong> <span id="studentClass">-</span></p>
            </div>

            <div id="guestStudentBox">
                <label>Имя</label>
                <input type="text" id="guestName" placeholder="Введите имя">

                <label>Класс</label>
                <input type="text" id="guestClass" placeholder="Введите класс">
            </div>

        </div>

        <div class="test-info-box">

            <!-- test title and task info from database later -->

            <p>
                <strong>Задание:</strong>
                <span id="testInstruction">Загрузка...</span>
            </p>

            <p>
                <strong>Код теста:</strong>
                <span id="testCode">-</span>
            </p>

        </div>

        <form id="studentTestForm">

            <div class="task-box">

                <label>Текст задания</label>

                <div class="task-text" id="taskText">
                    Текст задания будет загружен из базы данных.
                </div>

                <label>Ваш ответ</label>

                <p class="answer-help"> Введите текст полностью, восстановив пропущенные буквы.</p>

                <textarea id="studentAnswer" placeholder="Введите ответ"></textarea>

            </div>

            <div class="form-actions">
                <a href="../index.html" class="secondary-button">
                    Назад
                </a>

                <button type="submit" class="main-button">
                    Завершить тест
                </button>
            </div>

        </form>

        <p id="testMessage"></p>

    </section>

</main>

<footer>
    <p>© 2026 Тестирование знаний русского языка</p>
</footer>

<script src="../js/test.js"></script>

</body>
</html>
