<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прохождение теста</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/test.css">
</head>
<body>

<header>
    <div class="header-left">
        <img src="../img/logo.png" alt="Логотип платформы" class="logo">
    </div>

    <div class="header-center">
        <h1>Тестирование русского языка</h1>
        <div class="header-line"></div>
    </div>

    <div class="header-right">
        <a href="../index.html">
            <button class="auth-button">Главная</button>
        </a>
    </div>
</header>

<main class="test-main">

    <section class="test-container">

        <!-- test data from database later -->

        <h2>Прохождение теста</h2>

        <div class="student-info-box">

            <!-- student data from database later -->
            <!-- guest users enter data manually -->

            <h3>Ученик</h3>

            <p><strong>Имя:</strong> Anna Sidorova</p>
            <p><strong>Класс:</strong> 8A</p>

        </div>

        <div class="test-info-box">

            <!-- test title and task info from database later -->

            <p><strong>Название теста:</strong> будет загружено из базы данных</p>
            <p><strong>Задание:</strong> будет загружено из базы данных</p>

        </div>

        <form>

            <div class="task-box">

                <label>Текст задания</label>

                <div class="task-text">
                    Текст задания будет загружен из базы данных.
                </div>

                <label>Ваш ответ</label>

                <textarea placeholder="Введите ответ"></textarea>

            </div>

            <div class="form-actions">
                <a href="../index.html" class="secondary-button">
                    Назад
                </a>

                <button type="submit" class="main-button">
                    Завершить тест
                </button>
            </div>

        </form>

    </section>

</main>

<footer>
    <p>© 2026 Тестирование знаний русского языка</p>
</footer>

</body>
</html>
