<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Регистрация</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

<header>

    <div class="header-left">
        <img src="../img/logo.png" alt="Логотип платформы" class="logo">
    </div>

    <div class="header-center">
        <h1>Тестирование русского языка</h1>

        <div class="header-line"></div>
    </div>

    <div class="header-right">
        <a href="../index.html">
            <button class="auth-button">Главная</button>
        </a>
    </div>

</header>

<main class="auth-main">

    <div class="auth-container">

        <h2>Регистрация</h2>

    <form id="registerForm">

        <label>Имя</label>
        <input type="text" id="firstName" placeholder="Введите имя">

        <label>Фамилия</label>
        <input type="text" id="lastName" placeholder="Введите фамилию">

        <label>Email</label>
        <input type="email" id="email" placeholder="Введите email">

        <label>Класс</label>
        <input type="text" id="className" placeholder="Например: 10A">

        <label>Пароль</label>
        <input type="password" id="password" placeholder="Введите пароль">

        <label>Повторите пароль</label>
        <input type="password" id="repeatPassword" placeholder="Повторите пароль">

        <button type="submit" class="main-button">
            Зарегистрироваться
        </button>

    </form>

        <p id="registerMessage"></p>

        <p class="auth-text">
            Уже есть аккаунт?
            <a href="login.html">Войти</a>
        </p>

    </div>

</main>

<footer>
    <p>© 2026 Тестирование знаний русского языка</p>
</footer>

<script src="../js/register.js"></script>
</body>
</html>
